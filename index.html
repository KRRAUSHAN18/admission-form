<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMISSION FORM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
}

.bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

.form-container{
    width:min(98vw,1100px);
    max-width:1100px;
    padding:35px;
    border-radius:24px;
    background:rgba(255,255,255,0.01);
    backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.form-title{
    text-align:center;
    color:white;
    margin-bottom:25px;
    letter-spacing:2px;
    white-space:nowrap;
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.input-group{
    flex:1;
}

.form-label{
    display:block;
    color:white;
    margin-bottom:6px;
    font-size:14px;
}

.input-field{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    color:white;
}

.input-field::placeholder{
    color:rgba(255,255,255,0.7);
}

textarea.input-field{
    resize:none;
}

.file-box{
    position:relative;
    width:100%;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    display:flex;
    align-items:center;
    overflow:hidden;
}

.file-box input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
}

.file-box span{
    pointer-events:none;
}

.submit-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#3b82f6,#8b5cf6);
    transition: all 0.4s ease;
}

.submit-btn:hover{
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 25px rgba(59,130,246,0.6);
}

.submit-btn:active{
    transform: scale(0.97);
}

.footer{
    text-align:center;
    color:rgba(255,255,255,0.8);
    font-size:14px;
    margin-top:20px;
}

.raushan{
    display:inline-block;
    font-size:14px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    animation: glowText 3s ease-in-out infinite;
}

@keyframes glowText{
    0%{opacity:0.6; transform:translateY(0);}
    50%{opacity:1; transform:translateY(-3px);}
    100%{opacity:0.6; transform:translateY(0);}
}

.typing-form{
    display:inline-block;
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid white;
    width:0;
    position:relative;
    top:5px;
    animation: typingForm 2s steps(4,end) infinite,
               blink 0.8s step-end infinite;
}

@keyframes typingForm{
    0%{width:0;}
    50%,100%{width:5.5ch;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

@media (max-width:768px){
    .form-row{
        flex-direction:column;
        gap:15px;
    }

    .form-container{
        padding:20px;
    }

    .typing-form{
        animation:none;
        border-right:none;
        width:auto;
    }
}
</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
    <source src="1760165381495.mp4" type="video/mp4">
</video>

<div class="form-container">

<h1 class="form-title">
    ADMISSION <span class="typing-form">FORM</span>
</h1>

<form>

<div class="form-row">
    <div class="input-group">
        <label class="form-label">STUDENT NAME</label>
        <input type="text" class="input-field" placeholder="ENTER STUDENT NAME" required>
    </div>

    <div class="input-group">
        <label class="form-label">FATHER NAME</label>
        <input type="text" class="input-field" placeholder="ENTER FATHER NAME" required>
    </div>
</div>

<div class="form-row">
    <div class="input-group">
        <label class="form-label">MOTHER NAME</label>
        <input type="text" class="input-field" placeholder="ENTER MOTHER NAME" required>
    </div>

    <div class="input-group">
        <label class="form-label">DATE OF BIRTH</label>
        <input type="date" class="input-field" required>
    </div>
</div>

<div class="form-row">
    <div class="input-group">
        <label class="form-label">GENDER</label>
        <select class="input-field" required>
            <option value="">SELECT GENDER</option>
            <option>MALE</option>
            <option>FEMALE</option>
        </select>
    </div>

    <div class="input-group">
        <label class="form-label">MOBILE NUMBER</label>
        <input type="tel" class="input-field" placeholder="ENTER MOBILE NUMBER" required>
    </div>
</div>

<div class="form-row">
    <div class="input-group">
        <label class="form-label">EMAIL ADDRESS</label>
        <input type="email" class="input-field" placeholder="ENTER EMAIL ADDRESS">
    </div>

    <div class="input-group">
        <label class="form-label">COURSE</label>
        <select class="input-field">
            <option>SELECT COURSE</option>
            <option>TALLY PRIME</option>
            <option>ADCA</option>
            <option>DFA</option>
            <option>DCA</option>
        </select>
    </div>
</div>

<div class="form-row">
    <div class="input-group">
        <label class="form-label">STUDENT PHOTO</label>
        <div class="file-box">
            <span>Select Photo</span>
            <input type="file" accept="image/*">
        </div>
    </div>
</div>

<div class="input-group">
    <label class="form-label">ADDRESS</label>
    <textarea class="input-field" rows="3" placeholder="ENTER ADDRESS"></textarea>
</div>

<button type="submit" class="submit-btn">SUBMIT APPLICATION</button>

</form>

<footer class="footer">
    <p class="raushan">RAUSHAN KUMAR MANDAL</p>
</footer>

</div>

</body>
</html>
